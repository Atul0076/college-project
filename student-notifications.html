<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Notifications — Student Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Fraunces','serif'],body:['DM Sans','sans-serif']},colors:{navy:{900:'#0a0f1e',800:'#0d1529',700:'#111d3a',600:'#162347',500:'#1e2f5a'},teal:{400:'#2dd4bf',500:'#14b8a6',600:'#0d9488'},amber:{400:'#fbbf24',500:'#f59e0b'},coral:{400:'#fb7185',500:'#f43f5e'},violet:{400:'#a78bfa',500:'#8b5cf6'}}}}}
</script>
<script src="shared.js"></script>
<style>
*{font-family:'DM Sans',sans-serif}.display{font-family:'Fraunces',serif}
body{background:#0a0f1e;color:#fff}
.card{background:rgba(13,21,41,0.8);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:1rem}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.topbar{background:rgba(13,21,41,0.9);border-bottom:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px)}
.sidebar-link{transition:all .3s;border-left:2px solid transparent}
.sidebar-link:hover{border-left-color:#14b8a6;background:rgba(20,184,166,0.1)}
.sidebar-link.active{border-left-color:#14b8a6;background:rgba(20,184,166,0.15)}
.notification-card{transition:all .3s;cursor:pointer;border-left:4px solid transparent}
.notification-card:hover{transform:translateX(4px)}
.notif-unread{border-left-color:#2dd4bf;background:rgba(20,184,166,0.1)}
.notif-read{border-left-color:transparent}
.notif-info{background:rgba(20,184,166,0.1);border-color:rgba(45,212,191,0.3)}
.notif-warning{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3)}
.notif-alert{background:rgba(244,63,94,0.1);border-color:rgba(244,63,94,0.3)}
</style>
</head>
<body class="min-h-screen">
<div class="grid-bg"></div>
<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="hidden lg:flex w-64 bg-navy-900 border-r border-white/5 flex-col">
  <div class="p-6 border-b border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center shadow-lg shadow-teal-500/30">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </div>
      <span class="display text-white text-xl font-bold">EduCore</span>
    </div>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a href="student-dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a href="student-classes.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      My Classes
    </a>
    <a href="student-grades.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Grades
    </a>
    <a href="student-attendance.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Attendance
    </a>
    <a href="student-notifications.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-teal-400 text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      Notifications
    </a>
  </nav>
  <div class="p-4 border-t border-white/5">
    <button onclick="logout()" class="w-full py-2 rounded-lg bg-coral-500 hover:bg-coral-400 text-white text-sm font-semibold transition-all">Logout</button>
  </div>
</aside>

<!-- Main Content -->
<div class="flex-1 flex flex-col min-h-screen">

<!-- Topbar -->
<div class="topbar px-4 lg:px-6 py-4 flex items-center justify-between">
  <h1 class="display text-2xl font-bold text-white">Notifications</h1>
  <div id="userProfile" class="flex items-center gap-4">
    <div class="text-right">
      <p id="userName" class="text-white font-semibold text-sm"></p>
      <p class="text-slate-400 text-xs">Student</p>
    </div>
    <div id="userAvatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center text-white font-semibold"></div>
  </div>
</div>

<!-- Main Content Area -->
<main class="flex-1 p-4 lg:p-6 space-y-6 overflow-auto">

  <!-- Page Header -->
  <div class="card p-6 flex items-center justify-between">
    <div>
      <h2 class="display text-2xl font-black text-white mb-2">All Notifications</h2>
      <p class="text-slate-400 text-sm">Stay updated with latest announcements and messages</p>
    </div>
    <div class="flex gap-2">
      <button onclick="markAllRead()" class="px-4 py-2 rounded-lg border border-white/10 text-slate-400 hover:text-white text-sm font-semibold transition-all">Mark All Read</button>
    </div>
  </div>

  <!-- Unread Count Badge -->
  <div class="flex items-center gap-2">
    <div class="w-3 h-3 rounded-full bg-teal-400"></div>
    <p class="text-teal-400 text-sm font-semibold"><span id="unreadCount">0</span> unread notifications</p>
  </div>

  <!-- Notifications List -->
  <div id="notificationsList" class="space-y-3">
    <!-- Notifications will be populated here -->
  </div>

</main>

</div>

</div>

<script>
const user = authGuard('Student');

document.getElementById('userName').textContent = user.name;
document.getElementById('userAvatar').textContent = user.avatar;

let notifications = [
  {id: 1, title: 'Assignment Due Tomorrow', message: 'Your Mathematics assignment is due tomorrow at 5:00 PM. Make sure you submit on time.', type: 'warning', read: false, time: '2 hours ago'},
  {id: 2, title: 'Grade Published', message: 'Your Physics Lab Report has been graded. You scored A (88/100)', type: 'info', read: false, time: '5 hours ago'},
  {id: 3, title: 'Class Schedule Change', message: 'World Literature class has been moved to Room C-106 starting next week.', type: 'info', read: true, time: '1 day ago'},
  {id: 4, title: 'Attendance Alert', message: 'Your attendance in History class is below 80%. Please attend the next classes regularly.', type: 'alert', read: true, time: '2 days ago'},
  {id: 5, title: 'New Announcement', message: 'Dr. Alan Foster posted a new resource for Chapter 5: Advanced Calculus', type: 'info', read: true, time: '3 days ago'},
  {id: 6, title: 'Event Reminder', message: 'Science Fair Registration closes on December 15, 2024. Register your project now!', type: 'warning', read: true, time: '4 days ago'},
  {id: 7, title: 'Parent-Teacher Meeting', message: 'Your parent-teacher meeting is scheduled for December 12, 2024 at 3:00 PM', type: 'info', read: true, time: '1 week ago'},
];

const getTypeClass = (type) => {
  const typeMap = {
    'info': 'notif-info',
    'warning': 'notif-warning',
    'alert': 'notif-alert'
  };
  return typeMap[type] || 'notif-info';
};

const getTypeIcon = (type) => {
  const iconMap = {
    'info': '<svg class="w-5 h-5 text-teal-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    'warning': '<svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    'alert': '<svg class="w-5 h-5 text-coral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4v2m0 4v2M12 6a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
  };
  return iconMap[type] || iconMap['info'];
};

const renderNotifications = () => {
  const notifHTML = notifications.map(notif => `
    <div class="notification-card ${getTypeClass(notif.type)} p-4 rounded-lg border ${notif.read ? 'notif-read border-white/10' : 'notif-unread'} transition-all">
      <div class="flex items-start gap-4">
        <div class="flex-shrink-0 mt-1">
          ${getTypeIcon(notif.type)}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-start justify-between">
            <div>
              <h3 class="text-white font-semibold text-sm">${notif.title}</h3>
              <p class="text-slate-400 text-sm mt-1">${notif.message}</p>
            </div>
            ${!notif.read ? '<div class="flex-shrink-0 w-3 h-3 rounded-full bg-teal-400"></div>' : ''}
          </div>
          <p class="text-slate-500 text-xs mt-2">${notif.time}</p>
        </div>
      </div>
    </div>
  `).join('');
  
  document.getElementById('notificationsList').innerHTML = notifHTML;
  updateUnreadCount();
};

const updateUnreadCount = () => {
  const unread = notifications.filter(n => !n.read).length;
  document.getElementById('unreadCount').textContent = unread;
};

window.markAllRead = () => {
  notifications.forEach(n => n.read = true);
  renderNotifications();
};

renderNotifications();
</script>

</body>
</html>

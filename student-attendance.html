<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Attendance — Student Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Fraunces','serif'],body:['DM Sans','sans-serif']},colors:{navy:{900:'#0a0f1e',800:'#0d1529',700:'#111d3a',600:'#162347',500:'#1e2f5a'},teal:{400:'#2dd4bf',500:'#14b8a6',600:'#0d9488'},amber:{400:'#fbbf24',500:'#f59e0b'},coral:{400:'#fb7185',500:'#f43f5e'},violet:{400:'#a78bfa',500:'#8b5cf6'}}}}}
</script>
<script src="shared.js"></script>
<style>
*{font-family:'DM Sans',sans-serif}.display{font-family:'Fraunces',serif}
body{background:#0a0f1e;color:#fff}
.card{background:rgba(13,21,41,0.8);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:1rem}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.topbar{background:rgba(13,21,41,0.9);border-bottom:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px)}
.sidebar-link{transition:all .3s;border-left:2px solid transparent}
.sidebar-link:hover{border-left-color:#14b8a6;background:rgba(20,184,166,0.1)}
.sidebar-link.active{border-left-color:#14b8a6;background:rgba(20,184,166,0.15)}
.status-badge{display:inline-block;padding:0.375rem 0.75rem;border-radius:0.375rem;font-weight:600;font-size:0.75rem}
.status-present{background:rgba(20,184,166,0.15);color:#2dd4bf}
.status-absent{background:rgba(244,63,94,0.15);color:#fb7185}
.status-late{background:rgba(251,191,36,0.15);color:#fbbf24}
</style>
</head>
<body class="min-h-screen">
<div class="grid-bg"></div>
<div class="flex min-h-screen">

<!-- Sidebar -->
<aside class="hidden lg:flex w-64 bg-navy-900 border-r border-white/5 flex-col">
  <div class="p-6 border-b border-white/5">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center shadow-lg shadow-teal-500/30">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
      </div>
      <span class="display text-white text-xl font-bold">EduCore</span>
    </div>
  </div>
  <nav class="flex-1 p-4 space-y-1">
    <a href="student-dashboard.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Dashboard
    </a>
    <a href="student-classes.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
      My Classes
    </a>
    <a href="student-grades.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Grades
    </a>
    <a href="student-attendance.html" class="sidebar-link active flex items-center gap-3 px-4 py-3 rounded-lg text-teal-400 text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
      Attendance
    </a>
    <a href="student-notifications.html" class="sidebar-link flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:text-white text-sm font-medium">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      Notifications
    </a>
  </nav>
  <div class="p-4 border-t border-white/5">
    <button onclick="logout()" class="w-full py-2 rounded-lg bg-coral-500 hover:bg-coral-400 text-white text-sm font-semibold transition-all">Logout</button>
  </div>
</aside>

<!-- Main Content -->
<div class="flex-1 flex flex-col min-h-screen">

<!-- Topbar -->
<div class="topbar px-4 lg:px-6 py-4 flex items-center justify-between">
  <h1 class="display text-2xl font-bold text-white">Attendance</h1>
  <div id="userProfile" class="flex items-center gap-4">
    <div class="text-right">
      <p id="userName" class="text-white font-semibold text-sm"></p>
      <p class="text-slate-400 text-xs">Student</p>
    </div>
    <div id="userAvatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-teal-400 to-teal-600 flex items-center justify-center text-white font-semibold"></div>
  </div>
</div>

<!-- Main Content Area -->
<main class="flex-1 p-4 lg:p-6 space-y-6 overflow-auto">

  <!-- Page Header with Stats -->
  <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
    <div class="card p-5">
      <div class="text-slate-400 text-xs uppercase tracking-wider font-semibold mb-2">Attendance Rate</div>
      <div class="display text-3xl font-black text-teal-400 mb-1" id="attendanceRate">0%</div>
      <div class="text-slate-400 text-xs">Classes attended</div>
    </div>
    
    <div class="card p-5">
      <div class="text-slate-400 text-xs uppercase tracking-wider font-semibold mb-2">Present</div>
      <div class="display text-3xl font-black text-teal-400" id="presentCount">0</div>
      <div class="text-slate-400 text-xs">out of total</div>
    </div>
    
    <div class="card p-5">
      <div class="text-slate-400 text-xs uppercase tracking-wider font-semibold mb-2">Absent</div>
      <div class="display text-3xl font-black text-coral-400" id="absentCount">0</div>
      <div class="text-slate-400 text-xs">classes missed</div>
    </div>
    
    <div class="card p-5">
      <div class="text-slate-400 text-xs uppercase tracking-wider font-semibold mb-2">Late</div>
      <div class="display text-3xl font-black text-amber-400" id="lateCount">0</div>
      <div class="text-slate-400 text-xs">times marked</div>
    </div>
  </div>

  <!-- Attendance Records -->
  <div class="card p-6">
    <h3 class="display text-xl font-bold text-white mb-6">Attendance History</h3>
    
    <div id="attendanceTable" class="space-y-3">
      <!-- Attendance records will be populated here -->
    </div>
  </div>

  <!-- By Class Summary -->
  <div class="card p-6">
    <h3 class="display text-xl font-bold text-white mb-6">Attendance by Class</h3>
    
    <div id="classSummary" class="space-y-3">
      <!-- Class summaries will be populated here -->
    </div>
  </div>

</main>

</div>

</div>

<script>
const user = authGuard('Student');
const students = getStudents();
const student = students.find(s => s.id === user.id);

document.getElementById('userName').textContent = user.name;
document.getElementById('userAvatar').textContent = user.avatar;

const attendanceRecords = [
  {date: 'Dec 4, 2024', class: 'Advanced Mathematics', status: 'present', time: '8:00 AM'},
  {date: 'Dec 4, 2024', class: 'Physics Fundamentals', status: 'present', time: '9:00 AM'},
  {date: 'Dec 3, 2024', class: 'World Literature', status: 'present', time: '10:00 AM'},
  {date: 'Dec 3, 2024', class: 'Modern History', status: 'late', time: '11:15 AM'},
  {date: 'Dec 3, 2024', class: 'Web Development', status: 'absent', time: 'N/A'},
  {date: 'Dec 2, 2024', class: 'Advanced Mathematics', status: 'present', time: '8:02 AM'},
  {date: 'Dec 2, 2024', class: 'Physics Fundamentals', status: 'present', time: '9:00 AM'},
  {date: 'Dec 1, 2024', class: 'World Literature', status: 'present', time: '10:00 AM'},
  {date: 'Nov 30, 2024', class: 'Studio Arts', status: 'present', time: '1:00 PM'},
  {date: 'Nov 30, 2024', class: 'Modern History', status: 'present', time: '11:00 AM'},
];

const present = attendanceRecords.filter(r => r.status === 'present').length;
const absent = attendanceRecords.filter(r => r.status === 'absent').length;
const late = attendanceRecords.filter(r => r.status === 'late').length;
const total = attendanceRecords.length;

document.getElementById('attendanceRate').textContent = Math.round((present / total) * 100) + '%';
document.getElementById('presentCount').textContent = present;
document.getElementById('absentCount').textContent = absent;
document.getElementById('lateCount').textContent = late;

const getStatusBadge = (status) => {
  const statusMap = {
    'present': 'status-present',
    'absent': 'status-absent',
    'late': 'status-late'
  };
  const statusText = {
    'present': 'Present',
    'absent': 'Absent',
    'late': 'Late'
  };
  return `<span class="status-badge ${statusMap[status]}">${statusText[status]}</span>`;
};

const attendanceTableHTML = attendanceRecords.map(record => `
  <div class="flex items-center justify-between p-4 bg-navy-800/30 rounded-lg border border-white/10">
    <div>
      <p class="text-white font-semibold text-sm">${record.class}</p>
      <div class="flex items-center gap-3 text-xs text-slate-400">
        <span>${record.date}</span>
        <span>•</span>
        <span>${record.time}</span>
      </div>
    </div>
    ${getStatusBadge(record.status)}
  </div>
`).join('');
document.getElementById('attendanceTable').innerHTML = attendanceTableHTML;

// Group by class and calculate attendance
const classes = getClasses();
const classSummaryHTML = classes.slice(0, 5).map(cls => {
  const classRecords = attendanceRecords.filter(r => r.class === cls.name);
  const presentInClass = classRecords.filter(r => r.status === 'present').length;
  const percentage = classRecords.length > 0 ? Math.round((presentInClass / classRecords.length) * 100) : 0;
  return `
    <div class="p-4 bg-navy-800/50 rounded-lg border border-white/10">
      <div class="flex items-center justify-between mb-3">
        <div>
          <h4 class="text-white font-semibold text-sm">${cls.name}</h4>
          <p class="text-slate-400 text-xs">Teacher: ${cls.teacher}</p>
        </div>
        <span class="display text-xl font-bold text-teal-400">${percentage}%</span>
      </div>
      <div class="h-2 bg-navy-700 rounded-full">
        <div class="h-full bg-gradient-to-r from-teal-400 to-teal-500 rounded-full" style="width: ${percentage}%"></div>
      </div>
    </div>
  `;
}).join('');
document.getElementById('classSummary').innerHTML = classSummaryHTML;
</script>

</body>
</html>

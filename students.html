<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduCore Pro — Students</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Fraunces','serif'],body:['DM Sans','sans-serif']},colors:{navy:{900:'#0a0f1e',800:'#0d1529',700:'#111d3a',600:'#162347',500:'#1e2f5a'},teal:{400:'#2dd4bf',500:'#14b8a6',600:'#0d9488'},amber:{400:'#fbbf24',500:'#f59e0b'},coral:{400:'#fb7185',500:'#f43f5e'},violet:{400:'#a78bfa',500:'#8b5cf6'}}}}}</script>
<script src="shared.js"></script>
<style>
*{font-family:'DM Sans',sans-serif}.display{font-family:'Fraunces',serif}
body{background:#0a0f1e;color:#fff}
.card{background:rgba(13,21,41,0.9);border:1px solid rgba(255,255,255,0.07);backdrop-filter:blur(12px);border-radius:1rem}
.modal-bg{background:rgba(0,0,0,0.7);backdrop-filter:blur(4px)}
.input-field{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#fff;transition:all .3s;border-radius:.75rem;padding:.625rem 1rem;font-size:.875rem;width:100%}
.input-field:focus{outline:none;border-color:rgba(45,212,191,0.6);background:rgba(45,212,191,0.05);box-shadow:0 0 0 3px rgba(45,212,191,0.1)}
.select-field{background:rgba(13,21,41,0.95);border:1px solid rgba(255,255,255,0.1);color:#fff;border-radius:.75rem;padding:.625rem 1rem;font-size:.875rem;width:100%}
.select-field:focus{outline:none;border-color:rgba(45,212,191,0.6)}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(45,212,191,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(45,212,191,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.student-row{transition:all .2s}
.student-row:hover{background:rgba(255,255,255,0.03)}
.badge-active{background:rgba(45,212,191,0.15);color:#2dd4bf;border:1px solid rgba(45,212,191,0.2)}
.badge-inactive{background:rgba(251,113,133,0.15);color:#fb7185;border:1px solid rgba(251,113,133,0.2)}
.btn-primary{background:linear-gradient(135deg,#14b8a6,#0d9488);transition:all .3s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(20,184,166,0.35)}
.slide-in{animation:slideIn .4s ease forwards;opacity:0}
@keyframes slideIn{to{opacity:1;transform:translateY(0)}from{opacity:0;transform:translateY(12px)}}
</style>
</head>
<body class="min-h-screen">
<div class="grid-bg"></div>
<div id="sidebarMount"></div>

<div class="lg:ml-64 flex flex-col min-h-screen">
  <div id="topbarMount"></div>

  <main class="flex-1 p-4 lg:p-6 space-y-5">

    <!-- Header Actions -->
    <div class="slide-in flex flex-col sm:flex-row sm:items-center gap-3 justify-between">
      <div>
        <h2 class="display text-2xl font-black text-white">Student Management</h2>
        <p class="text-slate-500 text-sm" id="studentCount">Loading...</p>
      </div>
      <button onclick="openModal()" class="btn-primary px-5 py-2.5 rounded-xl text-white text-sm font-semibold flex items-center gap-2 w-fit">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        Add New Student
      </button>
    </div>

    <!-- Stats Row -->
    <div class="slide-in grid grid-cols-2 lg:grid-cols-4 gap-3" style="animation-delay:.1s">
      <div class="card p-4">
        <div class="text-slate-500 text-xs mb-1">Total Enrolled</div>
        <div class="display text-2xl font-black text-white" id="totalCount">—</div>
      </div>
      <div class="card p-4">
        <div class="text-slate-500 text-xs mb-1">Active</div>
        <div class="display text-2xl font-black text-teal-400" id="activeCount">—</div>
      </div>
      <div class="card p-4">
        <div class="text-slate-500 text-xs mb-1">Avg GPA</div>
        <div class="display text-2xl font-black text-amber-400" id="avgGpa">—</div>
      </div>
      <div class="card p-4">
        <div class="text-slate-500 text-xs mb-1">Avg Attendance</div>
        <div class="display text-2xl font-black text-violet-400" id="avgAtt">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="slide-in card p-4" style="animation-delay:.15s">
      <div class="flex flex-col md:flex-row gap-3">
        <div class="flex-1 flex items-center gap-2 bg-white/5 border border-white/10 rounded-xl px-3 py-2">
          <svg class="w-4 h-4 text-slate-500 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, email, grade..." class="bg-transparent text-slate-300 text-sm outline-none w-full placeholder-slate-600" oninput="filterStudents()"/>
        </div>
        <select id="gradeFilter" class="select-field md:w-40" onchange="filterStudents()">
          <option value="">All Grades</option>
          <option value="9">Grade 9</option>
          <option value="10">Grade 10</option>
          <option value="11">Grade 11</option>
          <option value="12">Grade 12</option>
        </select>
        <select id="statusFilter" class="select-field md:w-36" onchange="filterStudents()">
          <option value="">All Status</option>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
        <div class="flex border border-white/10 rounded-xl overflow-hidden">
          <button onclick="setView('table')" id="tableBtn" class="px-3 py-2 bg-teal-500/20 text-teal-400 transition-all text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
          </button>
          <button onclick="setView('grid')" id="gridBtn" class="px-3 py-2 text-slate-500 hover:text-white transition-all text-sm">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Student Table -->
    <div id="tableView" class="slide-in card overflow-hidden" style="animation-delay:.2s">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead>
            <tr class="border-b border-white/5">
              <th class="text-left px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider">Student</th>
              <th class="text-left px-4 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider hidden md:table-cell">Grade</th>
              <th class="text-left px-4 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider hidden lg:table-cell">Subject</th>
              <th class="text-left px-4 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider hidden sm:table-cell">GPA</th>
              <th class="text-left px-4 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider hidden lg:table-cell">Attendance</th>
              <th class="text-left px-4 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
              <th class="text-right px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody id="studentTableBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="hidden py-16 text-center">
        <svg class="w-12 h-12 text-slate-700 mx-auto mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
        <p class="text-slate-500">No students found</p>
      </div>
    </div>

    <!-- Grid View -->
    <div id="gridView" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="studentGrid"></div>

  </main>
</div>

<!-- Add/Edit Modal -->
<div id="studentModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
  <div class="modal-bg absolute inset-0" onclick="closeModal()"></div>
  <div class="relative w-full max-w-2xl bg-navy-800 border border-white/10 rounded-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
    <div class="p-6 border-b border-white/5 flex items-center justify-between">
      <div>
        <h3 class="display text-xl font-black text-white" id="modalTitle">Add New Student</h3>
        <p class="text-slate-500 text-sm">Fill in all required fields</p>
      </div>
      <button onclick="closeModal()" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <form id="studentForm" class="p-6 space-y-5">
      <input type="hidden" id="studentId"/>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Full Name *</label>
          <input type="text" id="f_name" class="input-field" placeholder="John Doe" required/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Age *</label>
          <input type="number" id="f_age" class="input-field" placeholder="16" min="5" max="25" required/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Email *</label>
          <input type="email" id="f_email" class="input-field" placeholder="student@school.edu" required/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Phone</label>
          <input type="tel" id="f_phone" class="input-field" placeholder="+1-555-0000"/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Grade *</label>
          <select id="f_grade" class="select-field" required>
            <option value="">Select grade</option>
            <option>9-A</option><option>9-B</option><option>9-C</option>
            <option>10-A</option><option>10-B</option><option>10-C</option>
            <option>11-A</option><option>11-B</option><option>11-C</option>
            <option>12-A</option><option>12-B</option><option>12-C</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Primary Subject</label>
          <select id="f_subject" class="select-field">
            <option>Mathematics</option><option>Science</option><option>Literature</option>
            <option>History</option><option>Computer Science</option><option>Arts</option>
            <option>Music</option><option>Physical Ed</option><option>Chemistry</option><option>Biology</option>
          </select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">GPA</label>
          <input type="number" id="f_gpa" class="input-field" placeholder="3.5" min="0" max="4" step="0.01"/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Attendance %</label>
          <input type="number" id="f_attendance" class="input-field" placeholder="90" min="0" max="100"/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Status</label>
          <select id="f_status" class="select-field"><option>Active</option><option>Inactive</option></select>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Joined Date</label>
          <input type="date" id="f_joined" class="input-field"/>
        </div>
      </div>
      <div>
        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Address</label>
        <input type="text" id="f_address" class="input-field" placeholder="123 Main St, City, State"/>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Parent/Guardian Name</label>
          <input type="text" id="f_parent" class="input-field" placeholder="Parent Name"/>
        </div>
        <div>
          <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Parent Phone</label>
          <input type="tel" id="f_parentPhone" class="input-field" placeholder="+1-555-0000"/>
        </div>
      </div>
      <div>
        <label class="block text-slate-400 text-xs font-semibold uppercase tracking-wider mb-1.5">Notes</label>
        <textarea id="f_notes" class="input-field" rows="2" placeholder="Academic notes, achievements..."></textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 text-sm font-medium hover:text-white transition-all">Cancel</button>
        <button type="submit" class="flex-1 btn-primary py-2.5 rounded-xl text-white text-sm font-semibold">Save Student</button>
      </div>
    </form>
  </div>
</div>

<!-- View Modal -->
<div id="viewModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
  <div class="modal-bg absolute inset-0" onclick="closeView()"></div>
  <div class="relative w-full max-w-lg bg-navy-800 border border-white/10 rounded-2xl shadow-2xl overflow-y-auto max-h-[90vh]">
    <div id="viewContent" class="p-6"></div>
  </div>
</div>

<!-- Delete Confirm -->
<div id="deleteModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
  <div class="modal-bg absolute inset-0" onclick="closeDelete()"></div>
  <div class="relative w-full max-w-sm bg-navy-800 border border-white/10 rounded-2xl shadow-2xl p-6 text-center">
    <div class="w-12 h-12 rounded-2xl bg-coral-400/15 flex items-center justify-center mx-auto mb-4">
      <svg class="w-6 h-6 text-coral-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
    </div>
    <h3 class="display text-lg font-black text-white mb-2">Delete Student</h3>
    <p class="text-slate-400 text-sm mb-6">This action cannot be undone. Are you sure?</p>
    <div class="flex gap-3">
      <button onclick="closeDelete()" class="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-400 text-sm hover:text-white transition-all">Cancel</button>
      <button onclick="confirmDelete()" class="flex-1 py-2.5 rounded-xl bg-coral-500 hover:bg-coral-400 text-white text-sm font-semibold transition-all">Delete</button>
    </div>
  </div>
</div>

<script>
document.getElementById('sidebarMount').innerHTML = renderSidebar('students');
document.getElementById('topbarMount').innerHTML = renderTopbar('Students', 'Manage student records, grades & profiles');

let students = getStudents();
let editId = null;
let deleteId = null;
let viewMode = 'table';

function updateStats() {
  document.getElementById('totalCount').textContent = students.length;
  document.getElementById('activeCount').textContent = students.filter(s=>s.status==='Active').length;
  const avgGpa = (students.reduce((a,s)=>a+s.gpa,0)/students.length).toFixed(2);
  document.getElementById('avgGpa').textContent = avgGpa;
  const avgAtt = Math.round(students.reduce((a,s)=>a+s.attendance,0)/students.length)+'%';
  document.getElementById('avgAtt').textContent = avgAtt;
  document.getElementById('studentCount').textContent = `${students.length} total students enrolled`;
}

const avatarColors = ['bg-teal-500/20 text-teal-400','bg-amber-400/20 text-amber-400','bg-violet-400/20 text-violet-400','bg-coral-400/20 text-coral-400'];

function renderTable(list) {
  const tbody = document.getElementById('studentTableBody');
  const empty = document.getElementById('emptyState');
  if (!list.length) { tbody.innerHTML=''; empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  tbody.innerHTML = list.map(s => `
  <tr class="student-row border-b border-white/5 cursor-pointer" onclick="viewStudent(${s.id})">
    <td class="px-5 py-3.5">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl ${avatarColors[s.id%4]} flex items-center justify-center text-xs font-bold flex-shrink-0">${s.avatar}</div>
        <div>
          <div class="text-white text-sm font-medium">${s.name}</div>
          <div class="text-slate-500 text-xs">${s.email}</div>
        </div>
      </div>
    </td>
    <td class="px-4 py-3.5 hidden md:table-cell"><span class="text-slate-300 text-sm">${s.grade}</span></td>
    <td class="px-4 py-3.5 hidden lg:table-cell"><span class="text-slate-400 text-sm">${s.subject}</span></td>
    <td class="px-4 py-3.5 hidden sm:table-cell">
      <div class="flex items-center gap-2">
        <div class="w-16 h-1.5 bg-navy-700 rounded-full overflow-hidden"><div class="h-full rounded-full ${s.gpa>=3.7?'bg-teal-500':s.gpa>=3.0?'bg-amber-400':'bg-coral-400'}" style="width:${(s.gpa/4)*100}%"></div></div>
        <span class="text-white text-sm font-medium">${s.gpa}</span>
      </div>
    </td>
    <td class="px-4 py-3.5 hidden lg:table-cell">
      <div class="flex items-center gap-2">
        <div class="w-16 h-1.5 bg-navy-700 rounded-full overflow-hidden"><div class="h-full rounded-full ${s.attendance>=90?'bg-teal-500':s.attendance>=75?'bg-amber-400':'bg-coral-400'}" style="width:${s.attendance}%"></div></div>
        <span class="text-slate-300 text-sm">${s.attendance}%</span>
      </div>
    </td>
    <td class="px-4 py-3.5">
      <span class="px-2.5 py-1 rounded-full text-xs font-medium ${s.status==='Active'?'badge-active':'badge-inactive'}">${s.status}</span>
    </td>
    <td class="px-5 py-3.5 text-right">
      <div class="flex items-center justify-end gap-1" onclick="event.stopPropagation()">
        <button onclick="viewStudent(${s.id})" class="w-7 h-7 rounded-lg bg-white/5 hover:bg-teal-500/15 hover:text-teal-400 text-slate-500 flex items-center justify-center transition-all">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
        </button>
        <button onclick="editStudent(${s.id})" class="w-7 h-7 rounded-lg bg-white/5 hover:bg-amber-400/15 hover:text-amber-400 text-slate-500 flex items-center justify-center transition-all">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg>
        </button>
        <button onclick="deleteStudent(${s.id})" class="w-7 h-7 rounded-lg bg-white/5 hover:bg-coral-400/15 hover:text-coral-400 text-slate-500 flex items-center justify-center transition-all">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
        </button>
      </div>
    </td>
  </tr>`).join('');
}

function renderGrid(list) {
  const g = document.getElementById('gridView');
  g.innerHTML = list.map(s=>`
  <div class="card p-5 hover:border-white/15 transition-all cursor-pointer" onclick="viewStudent(${s.id})">
    <div class="flex items-start justify-between mb-4">
      <div class="w-12 h-12 rounded-2xl ${avatarColors[s.id%4]} flex items-center justify-center text-sm font-bold">${s.avatar}</div>
      <span class="px-2.5 py-1 rounded-full text-xs font-medium ${s.status==='Active'?'badge-active':'badge-inactive'}">${s.status}</span>
    </div>
    <div class="text-white font-semibold text-sm mb-0.5">${s.name}</div>
    <div class="text-slate-500 text-xs mb-3">${s.grade} · ${s.subject}</div>
    <div class="grid grid-cols-2 gap-2">
      <div class="bg-white/5 rounded-lg p-2 text-center"><div class="text-white text-sm font-bold">${s.gpa}</div><div class="text-slate-600 text-xs">GPA</div></div>
      <div class="bg-white/5 rounded-lg p-2 text-center"><div class="text-white text-sm font-bold">${s.attendance}%</div><div class="text-slate-600 text-xs">Attend.</div></div>
    </div>
    <div class="mt-3 flex gap-2 justify-end" onclick="event.stopPropagation()">
      <button onclick="editStudent(${s.id})" class="text-slate-500 hover:text-amber-400 transition-colors text-xs">Edit</button>
      <span class="text-slate-700">·</span>
      <button onclick="deleteStudent(${s.id})" class="text-slate-500 hover:text-coral-400 transition-colors text-xs">Delete</button>
    </div>
  </div>`).join('');
}

function filterStudents() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const grade = document.getElementById('gradeFilter').value;
  const status = document.getElementById('statusFilter').value;
  let list = students.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q) || s.grade.toLowerCase().includes(q);
    const matchG = !grade || s.grade.startsWith(grade);
    const matchS = !status || s.status === status;
    return matchQ && matchG && matchS;
  });
  if (viewMode==='table') renderTable(list); else renderGrid(list);
}

function setView(mode) {
  viewMode = mode;
  document.getElementById('tableView').classList.toggle('hidden', mode!=='table');
  document.getElementById('gridView').classList.toggle('hidden', mode!=='grid');
  document.getElementById('tableBtn').className = `px-3 py-2 transition-all text-sm ${mode==='table'?'bg-teal-500/20 text-teal-400':'text-slate-500 hover:text-white'}`;
  document.getElementById('gridBtn').className = `px-3 py-2 transition-all text-sm ${mode==='grid'?'bg-teal-500/20 text-teal-400':'text-slate-500 hover:text-white'}`;
  filterStudents();
}

function viewStudent(id) {
  const s = students.find(x=>x.id===id);
  document.getElementById('viewContent').innerHTML = `
  <div class="flex items-start justify-between mb-5">
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-2xl ${avatarColors[s.id%4]} flex items-center justify-center text-xl font-bold">${s.avatar}</div>
      <div>
        <h3 class="display text-xl font-black text-white">${s.name}</h3>
        <p class="text-slate-400 text-sm">${s.grade} · ${s.subject}</p>
        <span class="px-2.5 py-0.5 rounded-full text-xs font-medium mt-1 inline-block ${s.status==='Active'?'badge-active':'badge-inactive'}">${s.status}</span>
      </div>
    </div>
    <button onclick="closeView()" class="w-8 h-8 rounded-lg bg-white/5 flex items-center justify-center text-slate-400 hover:text-white transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="grid grid-cols-3 gap-3 mb-5">
    <div class="card p-3 text-center"><div class="display text-xl font-black text-teal-400">${s.gpa}</div><div class="text-slate-500 text-xs">GPA</div></div>
    <div class="card p-3 text-center"><div class="display text-xl font-black text-amber-400">${s.attendance}%</div><div class="text-slate-500 text-xs">Attendance</div></div>
    <div class="card p-3 text-center"><div class="display text-xl font-black text-violet-400">${s.age}</div><div class="text-slate-500 text-xs">Age</div></div>
  </div>
  <div class="space-y-2.5">
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Email</span><span class="text-slate-200 text-sm">${s.email}</span></div>
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Phone</span><span class="text-slate-200 text-sm">${s.phone||'—'}</span></div>
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Address</span><span class="text-slate-200 text-sm">${s.address||'—'}</span></div>
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Parent</span><span class="text-slate-200 text-sm">${s.parent||'—'}</span></div>
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Parent Phone</span><span class="text-slate-200 text-sm">${s.parentPhone||'—'}</span></div>
    <div class="flex gap-3"><span class="text-slate-500 text-sm w-28 flex-shrink-0">Joined</span><span class="text-slate-200 text-sm">${s.joined||'—'}</span></div>
    ${s.notes?`<div class="mt-3 p-3 rounded-xl bg-white/5 border border-white/5"><p class="text-slate-500 text-xs mb-1">Notes</p><p class="text-slate-300 text-sm">${s.notes}</p></div>`:''}
  </div>
  <div class="flex gap-3 mt-5 pt-5 border-t border-white/5">
    <button onclick="closeView();editStudent(${s.id})" class="flex-1 py-2.5 rounded-xl border border-white/10 text-slate-300 text-sm hover:text-amber-400 hover:border-amber-400/30 transition-all">Edit</button>
    <button onclick="closeView();deleteStudent(${s.id})" class="flex-1 py-2.5 rounded-xl border border-coral-400/20 text-coral-400 text-sm hover:bg-coral-400/10 transition-all">Delete</button>
  </div>`;
  document.getElementById('viewModal').classList.remove('hidden');
}
function closeView(){document.getElementById('viewModal').classList.add('hidden');}

function openModal(id=null){
  editId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit Student' : 'Add New Student';
  if (id) {
    const s = students.find(x=>x.id===id);
    document.getElementById('studentId').value = s.id;
    document.getElementById('f_name').value = s.name;
    document.getElementById('f_age').value = s.age;
    document.getElementById('f_email').value = s.email;
    document.getElementById('f_phone').value = s.phone||'';
    document.getElementById('f_grade').value = s.grade;
    document.getElementById('f_subject').value = s.subject;
    document.getElementById('f_gpa').value = s.gpa;
    document.getElementById('f_attendance').value = s.attendance;
    document.getElementById('f_status').value = s.status;
    document.getElementById('f_joined').value = s.joined||'';
    document.getElementById('f_address').value = s.address||'';
    document.getElementById('f_parent').value = s.parent||'';
    document.getElementById('f_parentPhone').value = s.parentPhone||'';
    document.getElementById('f_notes').value = s.notes||'';
  } else {
    document.getElementById('studentForm').reset();
    document.getElementById('studentId').value = '';
    document.getElementById('f_joined').value = new Date().toISOString().split('T')[0];
  }
  document.getElementById('studentModal').classList.remove('hidden');
}
function editStudent(id){openModal(id);}
function closeModal(){document.getElementById('studentModal').classList.add('hidden');}

function deleteStudent(id){deleteId=id;document.getElementById('deleteModal').classList.remove('hidden');}
function closeDelete(){document.getElementById('deleteModal').classList.add('hidden');}
function confirmDelete(){
  students=students.filter(s=>s.id!==deleteId);
  saveStudents(students);
  closeDelete();
  updateStats();
  filterStudents();
  showToast('Student deleted successfully','coral');
}

document.getElementById('studentForm').addEventListener('submit',function(e){
  e.preventDefault();
  const makeAvatar = n => n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const data = {
    name: document.getElementById('f_name').value.trim(),
    age: parseInt(document.getElementById('f_age').value),
    email: document.getElementById('f_email').value.trim(),
    phone: document.getElementById('f_phone').value.trim(),
    grade: document.getElementById('f_grade').value,
    subject: document.getElementById('f_subject').value,
    gpa: parseFloat(document.getElementById('f_gpa').value)||0,
    attendance: parseInt(document.getElementById('f_attendance').value)||0,
    status: document.getElementById('f_status').value,
    joined: document.getElementById('f_joined').value,
    address: document.getElementById('f_address').value.trim(),
    parent: document.getElementById('f_parent').value.trim(),
    parentPhone: document.getElementById('f_parentPhone').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
  };
  if (editId) {
    const idx = students.findIndex(s=>s.id===editId);
    students[idx] = {...students[idx],...data};
    showToast('Student updated successfully','teal');
  } else {
    data.id = Date.now();
    data.avatar = makeAvatar(data.name);
    students.unshift(data);
    showToast('Student added successfully','teal');
  }
  saveStudents(students);
  closeModal();
  updateStats();
  filterStudents();
});

function showToast(msg, type='teal'){
  const t=document.createElement('div');
  t.className=`fixed bottom-6 right-6 z-50 px-5 py-3 rounded-xl text-white text-sm font-medium shadow-2xl border ${type==='teal'?'bg-teal-600 border-teal-500/50':'bg-coral-500 border-coral-400/50'}`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

updateStats();
filterStudents();
</script>
</body>
</html>
